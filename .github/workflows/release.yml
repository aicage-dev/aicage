name: Release

"on":
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:

  verify-tagged-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Verify tagged commit is on origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, but that commit is not on origin/main." >&2
            echo "Push the commit to origin/main before pushing the release tag." >&2
            exit 1
          fi

  test-suite:
    uses: ./.github/workflows/test-suite.yml

  publish:
    name: Publish to PyPI
    needs: [verify-tagged-commit, test-suite]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aicage
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Verify Cosign image
        id: cosign
        uses: ./.github/actions/verify-cosign-image

      - name: Update cosign digest constant
        env:
          COSIGN_DIGEST: ${{ steps.cosign.outputs.digest }}
        # /_COSIGN_IMAGE_DIGEST: str = \(/     <- ADDRESS: only act on lines matching this
        # {                                     <- start a command block for that address
        #     N;                                <- pull in the next line too
        #     s#"sha256:[0-9a-f]+"#"${COSIGN_DIGEST}"#   <- the s### command
        # }                                     <- end block
        run: |
          sed -i -E \
            -e "/_COSIGN_IMAGE_DIGEST: str = \(/{N; s#\"sha256:[0-9a-f]+\"#\"${COSIGN_DIGEST}\"#}" \
            src/aicage/constants.py

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Smoke test built wheel
        run: |
          python -m venv .release-venv
          source .release-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          aicage --version

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas (again)
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist
