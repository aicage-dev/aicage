name: Release

"on":
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  test-suite:
    uses: ./.github/workflows/test-suite.yml

  publish:
    name: Publish to PyPI
    needs: [test-suite]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aicage
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Verify Cosign image
        id: cosign
        uses: ./.github/actions/verify-cosign-image

      - name: Update cosign digest constant
        env:
          COSIGN_DIGEST: ${{ steps.cosign.outputs.digest }}
        run: |
          sed -i \
            "s/^_COSIGN_IMAGE_DIGEST: str = .*/_COSIGN_IMAGE_DIGEST: str = \"${COSIGN_DIGEST}\"/" \
            src/aicage/constants.py

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548  # v6.1.0
        with:
          python-version: "3.11"

      - name: Build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas (again)
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: dist
