name: Lint and Test

"on":
  workflow_call:

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@28e5544cb61fef95d00ee312614a29c8e3a68a19  # v2.5.4
        with:
          include-first-party: 'true'

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install shellcheck and ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck ripgrep

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ./scripts/lint.sh

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Test
        run: pytest --cov=src --cov-report=term-missing
