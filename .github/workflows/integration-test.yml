name: Integration Tests

"on":
  workflow_call:
  workflow_dispatch:

jobs:
  integration-discover:
    name: Discover Integration Tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - id: collect
        name: Collect integration tests
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          tests = subprocess.check_output(
              ["pytest", "--collect-only", "-q", "-m", "integration and not proxy_integration"],
              text=True,
          ).splitlines()
          node_ids = [line for line in tests if "::" in line]
          matrix = {"include": [{"test": test} for test in node_ids]}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")
          PY

      - name: Print integration matrix
        run: |
          echo '${{ steps.collect.outputs.matrix }}' | python -m json.tool

  integration:
    name: Integration (${{ matrix.test }})
    runs-on: ubuntu-latest
    needs: integration-discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.integration-discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Run integration test
        env:
          AICAGE_RUN_INTEGRATION: "1"
        run: pytest -m "integration and not proxy_integration" ${{ matrix.test }}
