name: Test Suite

"on":
  workflow_call:

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548  # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ./scripts/lint.sh

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Test
        run: pytest --cov=src --cov-report=term-missing

  integration-test:
    name: Integration
    uses: ./.github/workflows/integration-test.yml

  integration-test-proxy:
    name: Integration Proxy
    uses: ./.github/workflows/integration-test-proxy.yml
