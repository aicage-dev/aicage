name: Integration Tests (Proxy E2E)

"on":
  workflow_dispatch:
  workflow_call:

jobs:
  integration-proxy:
    name: Integration proxy (${{ matrix.test }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: tests/aicage/integration/remote_builtin/test_proxy.py::test_proxy_host_and_runtime_network
            expected_host: api.github.com:443
          - test: tests/aicage/integration/remote_builtin/test_proxy.py::test_proxy_custom_agent_build_and_version
            expected_host: registry.npmjs.org:443
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Resolve Docker bridge gateway proxy endpoint
        run: |
          proxy_host="$(docker network inspect bridge -f '{{(index .IPAM.Config 0).Gateway}}')"
          if [ -z "$proxy_host" ]; then
            echo "Unable to resolve docker bridge gateway." >&2
            exit 1
          fi
          echo "PROXY_URL=http://$proxy_host:3128" >> "$GITHUB_ENV"

      - name: Start Squid proxy with explicit config
        run: |
          cat > squid.conf <<'EOF'
          http_port 3128
          acl all src all
          http_access allow all
          access_log stdio:/var/log/squid/access.log
          cache deny all
          coredump_dir /var/spool/squid
          EOF
          docker run -d --name squid-proxy \
            --network host \
            -v "$PWD/squid.conf:/etc/squid/squid.conf:ro" \
            ubuntu/squid:5.2-22.04_beta

      - name: Wait for Squid proxy and validate host proxy path
        env:
          NO_PROXY: localhost,127.0.0.1
        run: |
          for i in {1..60}; do
            if curl -fsS --proxy "$PROXY_URL" https://api.github.com >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Squid proxy did not become ready." >&2
          docker logs squid-proxy || true
          exit 1

      - name: Run proxy integration test
        env:
          AICAGE_RUN_INTEGRATION: "1"
          AICAGE_RUN_PROXY_INTEGRATION: "1"
          HTTP_PROXY: ${{ env.PROXY_URL }}
          HTTPS_PROXY: ${{ env.PROXY_URL }}
          ALL_PROXY: ${{ env.PROXY_URL }}
          NO_PROXY: localhost,127.0.0.1
        run: |
          pytest -m proxy_integration ${{ matrix.test }}

      - name: "On failure: Collect aicage logs"
        if: failure()
        run: |
          artifact_dir="$RUNNER_TEMP/aicage-logs-${{ strategy.job-index }}"
          mkdir -p "$artifact_dir"
          while IFS= read -r path; do
            rel_path="${path#/}"
            target_dir="$artifact_dir/$(dirname "$rel_path")"
            mkdir -p "$target_dir"
            cp -R "$path" "$target_dir/"
          done < <(
            find "${TMPDIR:-/tmp}" -type d -path "*/pytest-of-${USER}/*/.aicage" 2>/dev/null | sort
          )

      - name: "On failure: Upload aicage logs"
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aicage-logs-${{ strategy.job-index }}
          path: ${{ runner.temp }}/aicage-logs-${{ strategy.job-index }}
          if-no-files-found: ignore

      - name: Verify proxy traffic in Squid logs
        run: |
          docker logs squid-proxy > squid-access.log
          echo "Last proxy access lines:"
          tail -n 200 squid-access.log || true
          grep -q '${{ matrix.expected_host }}' squid-access.log
          grep -Eq '(ghcr.io|registry-1.docker.io|auth.docker.io):443' squid-access.log
