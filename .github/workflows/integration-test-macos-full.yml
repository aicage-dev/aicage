name: Integration Tests (macOS Full)

"on":
  workflow_dispatch:
    inputs:
      pytest_filter:
        description: Optional extra pytest arguments, for example a test path or -k expression.
        required: false
        default: ""
        type: string
      upload_logs_on_success:
        description: Upload aicage logs even when the test succeeds.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  integration-discover:
    name: Discover Integration Tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - id: collect
        name: Collect integration tests
        env:
          PYTEST_FILTER: ${{ inputs.pytest_filter }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex
          import subprocess

          command = [
              "pytest",
              "--collect-only",
              "-q",
              "-m",
              "integration and not proxy_integration",
          ]
          extra = os.environ["PYTEST_FILTER"].strip()
          if extra:
              command.extend(shlex.split(extra))
          tests = subprocess.check_output(command, text=True).splitlines()
          node_ids = [line for line in tests if "::" in line]
          matrix = {"include": [{"test": test} for test in node_ids]}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")
          PY

      - name: Print integration matrix
        run: |
          echo '${{ steps.collect.outputs.matrix }}' | python -m json.tool

  integration-macos:
    name: macOS full integration (${{ matrix.test }})
    runs-on: macos-26-intel
    needs: integration-discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.integration-discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Set up Docker Desktop
        uses: gh-workflow/setup-docker-desktop-macos@e20c593ec686d9af896d5db1f033e8d71fd82d67  # 0.0.12
        with:
          print_diagnostics: false

      - name: Run macOS full integration test
        env:
          AICAGE_RUN_INTEGRATION: "1"
        run: pytest -m "integration and not proxy_integration" ${{ matrix.test }}

      - name: Collect aicage logs
        if: failure() || inputs.upload_logs_on_success
        run: |
          artifact_dir="$RUNNER_TEMP/aicage-logs-${{ strategy.job-index }}"
          mkdir -p "$artifact_dir"
          if [ -d "$HOME/.aicage" ]; then
            mkdir -p "$artifact_dir/$HOME"
            cp -R "$HOME/.aicage" "$artifact_dir/$HOME/"
            printf 'Collected log directory:\n  %s\n' "$HOME/.aicage"
          else
            echo "Expected macOS integration logs at $HOME/.aicage, but that directory does not exist." >&2
          fi

      - name: Upload aicage logs
        if: failure() || inputs.upload_logs_on_success
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aicage-logs-${{ strategy.job-index }}
          path: ${{ runner.temp }}/aicage-logs-${{ strategy.job-index }}
          if-no-files-found: ignore
