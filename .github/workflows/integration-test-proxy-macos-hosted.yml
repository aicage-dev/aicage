name: Integration Tests (Proxy E2E macOS Hosted)

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:

  integration-proxy-macos:
    name: Integration proxy macOS (${{ matrix.test }})
    runs-on: macos-26-intel
    env:
      HOST_PROXY_URL: http://localhost:3128
      CONTAINER_PROXY_URL: http://host.docker.internal:3128
      AICAGE_TEST_CONTAINER_PROXY_URL: http://host.docker.internal:3128
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: tests/aicage/integration/remote_builtin/test_proxy.py::test_proxy_host_and_runtime_network
            expected_host: api.github.com:443
          - test: tests/aicage/integration/remote_builtin/test_proxy.py::test_proxy_custom_agent_build_and_version
            expected_host: registry.npmjs.org:443
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Syncing metadata and agents with sub-project 'aicage-image'
        run: |
          scripts/sync-with-aicage-image-projects.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Resolve image refs from repo config
        run: |
          PYTHONPATH=src python - <<'PY' >> "$GITHUB_ENV"
          from aicage.constants import (
              COSIGN_IMAGE_REF,
              IMAGE_BASE_REPOSITORY,
              IMAGE_REGISTRY,
              IMAGE_REPOSITORY,
              VERSION_CHECK_IMAGE,
          )

          print(f"AICAGE_TEST_IMAGE_REF={IMAGE_REGISTRY}/{IMAGE_REPOSITORY}:codex-ubuntu")
          print(f"AICAGE_BASE_IMAGE_REF={IMAGE_REGISTRY}/{IMAGE_BASE_REPOSITORY}:ubuntu")
          print(f"COSIGN_IMAGE_REF={COSIGN_IMAGE_REF}")
          print(f"VERSION_CHECK_IMAGE_REF={VERSION_CHECK_IMAGE}")
          PY

      - name: Validating config with schemas
        run: |
          scripts/validate-config-with-schemas.sh

      - name: Set up Docker Desktop
        uses: gh-workflow/setup-docker-desktop-macos@e20c593ec686d9af896d5db1f033e8d71fd82d67  # 0.0.12
        with:
          print_diagnostics: false

      - name: Start Squid proxy with published port
        run: |
          cat > squid.conf <<'EOF'
          http_port 3128
          acl all src all
          http_access allow all
          access_log stdio:/var/log/squid/access.log
          cache deny all
          coredump_dir /var/spool/squid
          EOF
          docker run -d --name squid-proxy \
            -p 127.0.0.1:3128:3128 \
            -v "$PWD/squid.conf:/etc/squid/squid.conf:ro" \
            ubuntu/squid:5.2-22.04_beta

      - name: Wait for Squid proxy and validate host proxy path
        env:
          NO_PROXY: localhost,127.0.0.1
        run: |
          for _ in {1..60}; do
            if curl -fsS --proxy "$HOST_PROXY_URL" https://api.github.com >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Squid proxy did not become ready." >&2
          docker logs squid-proxy || true
          exit 1

      - name: Pull cosign image
        run: docker pull "$COSIGN_IMAGE_REF"

      - name: Pull aicage test image
        run: docker pull "$AICAGE_TEST_IMAGE_REF"

      - name: Pull aicage base image
        run: docker pull "$AICAGE_BASE_IMAGE_REF"

      - name: Pull version check image
        run: docker pull "$VERSION_CHECK_IMAGE_REF"

      - name: Run proxy integration test
        env:
          AICAGE_RUN_INTEGRATION: "1"
          AICAGE_RUN_PROXY_INTEGRATION: "1"
          HTTP_PROXY: http://localhost:3128
          HTTPS_PROXY: http://localhost:3128
          ALL_PROXY: http://localhost:3128
          NO_PROXY: localhost,127.0.0.1
          TEST_NODE: ${{ matrix.test }}
        run: |
          pytest -m proxy_integration "$TEST_NODE"

      - name: "On failure: Collect aicage logs"
        if: failure()
        env:
          JOB_INDEX: ${{ strategy.job-index }}
        run: |
          artifact_dir="$RUNNER_TEMP/aicage-logs-$JOB_INDEX"
          mkdir -p "$artifact_dir"
          if [ -d "$HOME/.aicage" ]; then
            mkdir -p "$artifact_dir/$HOME"
            cp -R "$HOME/.aicage" "$artifact_dir/$HOME/"
          fi

      - name: "On failure: Upload aicage logs"
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aicage-logs-${{ strategy.job-index }}
          path: ${{ runner.temp }}/aicage-logs-${{ strategy.job-index }}
          if-no-files-found: ignore

      - name: Verify proxy traffic in Squid logs
        env:
          EXPECTED_HOST: ${{ matrix.expected_host }}
        if: always()
        run: |
          docker logs squid-proxy > squid-access.log
          echo "Last proxy access lines:"
          tail -n 200 squid-access.log || true
          grep -q "$EXPECTED_HOST" squid-access.log
